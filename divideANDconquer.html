  /* ---------- closest pair (canvas) ---------- */
  vizClosest(){
    this._cp={step:0,
      pts:[[40,60],[95,150],[120,40],[160,210],[210,90],[250,170],[300,55],[330,140],[360,200],[400,100]],
      line:230};
    this.renderCP();
  },
  renderCP(){
    const cp=this._cp, host=document.getElementById('vizhost'); if(!host)return;
    const steps=[
      'All n points in the plane. Brute force compares every pair — O(n²). We want O(n log n).',
      'Drop a vertical line ℓ that splits the points into a left half and a right half of equal size.',
      'Recurse on each side. Let δ_L, δ_R be the closest distances found, and δ = min(δ_L, δ_R).',
      'A closer pair could still straddle ℓ. Only points within distance δ of ℓ can matter — that is the δ-strip.',
      'Key fact: inside the strip, each point need only be checked against the next 7 points by y-order. A δ×2δ box splits into 8 squares of side δ/2; each holds ≤1 point because the diagonal δ/√2 < δ.'
    ];
    host.innerHTML=`
      <div class="cpwrap"><canvas id="cpcanvas" width="440" height="260"></canvas></div>
      <div class="vctrl">
        <button class="btn btn-ghost" onclick="Game._cp.step=0;Game.renderCP()">⟲ Reset</button>
        <button class="btn btn-primary" onclick="Game.cpStep()" ${cp.step>=4?'disabled style=opacity:.4':''}>Next ▶</button>
      </div>
      <div class="vlog"><div class="${cp.step===4?'good':'cool'}">${cp.step+1}. ${steps[cp.step]}</div></div>`;
    this.drawCP();
  },
  cpStep(){ if(this._cp.step<4){ this._cp.step++; this.renderCP(); this.burstAt(event,'var(--blue)'); } },
  drawCP(){
    const cp=this._cp; const cv=document.getElementById('cpcanvas'); if(!cv) return;
    const x=cv.getContext('2d'); const W=cv.width,H=cv.height;
    x.clearRect(0,0,W,H);
    const L=cp.line;
    // dividing line
    if(cp.step>=1){ x.strokeStyle='#F4E3AC'; x.lineWidth=2; x.setLineDash([6,5]); x.beginPath(); x.moveTo(L,0); x.lineTo(L,H); x.stroke(); x.setLineDash([]);
      x.fillStyle='#F4E3AC'; x.font='14px monospace'; x.fillText('ℓ',L+5,16); }
    // delta strip
    const delta=46;
    if(cp.step>=3){ x.fillStyle='rgba(83,86,93,.12)'; x.fillRect(L-delta,0,delta*2,H);
      x.strokeStyle='rgba(83,86,93,.5)'; x.lineWidth=1; x.strokeRect(L-delta,0,delta*2,H);
      x.fillStyle='#53565D'; x.font='12px monospace'; x.fillText('δ',L-delta/2-3,H-8); x.fillText('δ',L+delta/2-3,H-8); }
    // the box + 8 squares
    if(cp.step>=4){
      const by=150, bh=delta*2, h2=delta;
      x.strokeStyle='rgba(153,99,55,.9)'; x.lineWidth=2; x.strokeRect(L-delta,by,delta*2,bh);
      x.strokeStyle='rgba(153,99,55,.4)'; x.lineWidth=1;
      for(let c=1;c<4;c++){ x.beginPath(); x.moveTo(L-delta+c*(delta*2/4)*1,by); } // grid below
      // vertical grid (4 cols)
      for(let c=1;c<4;c++){ const gx=L-delta+c*(bh/4); x.beginPath(); x.moveTo(gx,by); x.lineTo(gx,by+bh); x.stroke(); }
      // horizontal grid (2 rows)
      x.beginPath(); x.moveTo(L-delta,by+h2); x.lineTo(L+delta,by+h2); x.stroke();
      x.fillStyle='#996337'; x.font='11px monospace'; x.fillText('δ×2δ → 8 squares of side δ/2',L-delta,by-6);
    }
    // points
    cp.pts.forEach(p=>{
      const side = p[0]<L;
      x.fillStyle = cp.step>=2 ? (side?'#53565D':'#996337') : '#FAF5E3';
      x.beginPath(); x.arc(p[0],p[1],5,0,7); x.fill();
    });
  },

  startExam(){
    const ch=CHAPTERS[Math.floor(Math.random()*CHAPTERS.length)];
    this._exam={ch, qs:ch.recall.slice(), idx:0, hp:ch.recall.length, max:ch.recall.length, score:0};
    this.renderExamQ();
  },
  renderExamQ(){
    const e=this._exam, q=e.qs[e.idx];
    const hpPct=100*e.hp/e.max;
    document.getElementById('app').innerHTML=`<div class="view"><div class="board"><div class="board-inner exam-stage">
      <div class="examiner" id="examiner">🎓</div>
      <div class="muted">Topic drawn at random: <b style="color:var(--violet)">${e.ch.title}</b> · Question ${e.idx+1} of ${e.qs.length}</div>
      <div class="hpbar"><i style="width:${hpPct}%"></i></div>
      <div class="exam-q">${e.idx===0?'“State the problem and write it on the board.”':'“'+q.prompt+'”'}</div>
      <div id="exam-model" class="recall" style="max-width:640px;margin:18px auto;text-align:left">
        <button class="btn btn-ghost" onclick="Game.examReveal()">Reveal model answer</button>
        <div class="model"><p class="prose mb0">${q.model}</p>
          <div class="rate-row">
            <button class="rate miss" onclick="Game.examRate(0)">✗ Missed</button>
            <button class="rate soso" onclick="Game.examRate(1)">~ Partial</button>
            <button class="rate nail" onclick="Game.examRate(2)">✓ Strong</button>
          </div>
        </div>
      </div>
      <button class="btn btn-ghost" onclick="Game.go('home')">Abandon exam</button>
    </div></div></div>`;
  },
  examReveal(){ const el=document.getElementById('exam-model'); if(el) el.classList.add('revealed'); },
  examRate(lvl){
    const e=this._exam;
    e.score += lvl; // 0,1,2
    if(lvl<2){ const ex=document.getElementById('examiner'); if(ex){ ex.classList.add('angry'); setTimeout(()=>ex.classList.remove('angry'),500);} }
    e.hp -= lvl===2?1:(lvl===1?0.5:0);
    e.idx++;
    if(e.idx>=e.qs.length){ this.examEnd(); return; }
    this.renderExamQ();
  },
  examEnd(){
    const e=this._exam;
    const maxScore=e.qs.length*2;
    const pct=Math.round(100*e.score/maxScore);
    const passed=pct>=60;
    if(passed){ this.state.examWins=(this.state.examWins||0)+1; this.grant('examiner'); this.award(50,'Survived the Examiner'); }
    document.getElementById('app').innerHTML=`<div class="view"><div class="board"><div class="board-inner exam-stage">
      <div class="examiner">${passed?'🎓':'😠'}</div>
      <h2 class="chalk-h" style="font-size:34px">${passed?'You passed the trial':'Not this time'}</h2>
      <p class="prose" style="max-width:560px;margin:10px auto">Topic: <b>${e.ch.title}</b> · You scored <b style="color:${passed?'var(--mint)':'var(--coral)'}">${pct}%</b>. ${passed?'The Examiner gives a curt nod and signs your seal.':'Review the topic and the blackboard drill, then face the Examiner again.'}</p>
      <div class="cta-row" style="justify-content:center">
        <button class="btn btn-primary" onclick="Game.startExam()">Draw another random topic</button>
        <button class="btn btn-ghost" onclick="Game.go('lesson','${e.ch.id}')">Study ${e.ch.title}</button>
        <button class="btn btn-ghost" onclick="Game.go('home')">↩ Map</button>
      </div>
    </div></div></div>`;
    if(passed) this.burst(window.innerWidth/2,180,'var(--yellow)');
  },

  /* ============================================================
     REVIEW DECK
     ============================================================ */
  renderReviewIntro(){
    const cards=[];
    CHAPTERS.forEach(c=>c.memorize.forEach(line=>cards.push({title:c.title,rune:c.rune,line})));
    this._rev={cards,idx:0,flipped:false};
    return `<div class="view"><div class="board"><div class="board-inner exam-stage">
      <div style="font-size:54px">🔁</div>
      <h2 class="chalk-h" style="font-size:34px">Quick Review Deck</h2>
      <p class="prose" style="max-width:560px;margin:10px auto">${cards.length} flashcards covering every must-memorise line across all seven algorithms. Try to recall each before flipping. Perfect for the night before.</p>
      <div class="cta-row" style="justify-content:center">
        <button class="btn btn-primary" onclick="Game.startReview()">Start the deck</button>
        <button class="btn btn-ghost" onclick="Game.go('home')">↩ Map</button>
      </div>
    </div></div></div>`;
  },
  startReview(){ this._rev.idx=0; this._rev.flipped=false; this.renderRev(); },
  renderRev(){
    const r=this._rev, c=r.cards[r.idx];
    document.getElementById('app').innerHTML=`<div class="view"><div class="board"><div class="board-inner exam-stage">
      <div class="muted">Card ${r.idx+1} / ${r.cards.length}</div>
      <div style="font-size:40px;margin:6px">${c.rune}</div>
      <div class="exam-q" style="font-size:24px">${c.title}</div>
      <div class="recall ${r.flipped?'revealed':''}" style="max-width:620px;margin:16px auto;text-align:left">
        <div class="prompt" style="font-size:20px">${r.flipped?'Key fact':'What must you remember here?'}</div>
        ${r.flipped?`<div class="model" style="display:block"><p class="prose mb0">${c.line}</p></div>`:''}
      </div>
      <div class="cta-row" style="justify-content:center">
        ${r.flipped
          ? `<button class="btn btn-ghost" onclick="Game.revPrev()">← Prev</button><button class="btn btn-primary" onclick="Game.revNext()">Next card →</button>`
          : `<button class="btn btn-primary" onclick="Game.revFlip()">Flip ⤺</button>`}
        <button class="btn btn-ghost" onclick="Game.go('home')">Done</button>
      </div>
    </div></div></div>`;
  },
  revFlip(){ this._rev.flipped=true; this.renderRev(); },
  revNext(){ const r=this._rev; r.idx=(r.idx+1)%r.cards.length; r.flipped=false; this.renderRev(); if(r.idx===0){ this.award(10,'Reviewed every card'); } },
  revPrev(){ const r=this._rev; r.idx=(r.idx-1+r.cards.length)%r.cards.length; r.flipped=false; this.renderRev(); },

  /* ---------- player name (optional flourish) ---------- */
  setPlayerName(){
    const n=window.prompt('What shall the Examiner call you, scholar?', this.state.player||'Scholar');
    if(n&&n.trim()){ this.state.player=n.trim().slice(0,24); this.save(); this.go('home'); }
  }

});

/* ---------- BOOT ---------- */
Game.init();

</script>

</body>
</html>
