<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greed for Power — Greedy Algorithms Oral Exam Trainer</title>
<style>
:root {
  --fern:#4C7755; --slate:#1B4443; --slate2:#2E4E48;
  --ink:#010916; --ink2:#021D22; --ink3:#021522;
  --jet:#082A2E; --olive:#6B8B5F; --bark:#716841;
  --emerald:#6FDBA1; --teal:#74B28D; --dteal:#0C3736;
  --aqua:#7FF5C8; --mint:#57A881;
  --gold:#df8ed4; --gold2:#c09479;
  --board:#0a2520; --chalk:#eaf6ee; --chalk-dim:#a9c9b8;
  --paper:#0b1a18;
  --danger:#d98a6a;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body {
  font-family:"Iowan Old Style","Palatino Linotype",ui-serif,Georgia,serif;
  background:
    radial-gradient(1200px 700px at 80% -10%, #0c3736 0%, transparent 60%),
    radial-gradient(900px 600px at -10% 110%, #021D22 0%, transparent 55%),
    linear-gradient(160deg,#010916 0%,#021522 45%,#02211f 100%);
  background-attachment: fixed; /* Keeps background stationary on scroll for depth */
  color:var(--chalk);
  min-height:100vh;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}

/* ---------- Custom Scrollbar ---------- */
::-webkit-scrollbar {
  width: 12px;
}
::-webkit-scrollbar-track {
  background: var(--ink);
}
::-webkit-scrollbar-thumb {
  background: var(--slate2);
  border-radius: 6px;
  border: 3px solid var(--ink);
}
::-webkit-scrollbar-thumb:hover {
  background: var(--teal);
}

/* ---------- Layout Elements ---------- */
.wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 24px 100px;
}
h1,h2,h3,h4 {font-weight:700;line-height:1.2;letter-spacing:.2px}
.sans {font-family:ui-sans-serif,-apple-system,"Segoe UI",Roboto,sans-serif}
.mono {font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace}
button {font-family:inherit;cursor:pointer; outline: none;}
a {color:var(--aqua)}

/* ---------- HUD ---------- */
.hud {
  position:sticky;top:0;z-index:50;
  display:flex;gap:14px;align-items:center;flex-wrap:wrap;
  padding:12px 20px;
  background:linear-gradient(180deg,rgba(1,9,22,.85),rgba(2,29,34,.75));
  backdrop-filter:blur(16px); /* Enhanced glassmorphism */
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(127,245,200,.15);
  box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); /* Added shadow */
  transition: all 0.3s ease;
}
.crest {font-size:1.1rem;font-weight:800;color:var(--gold);letter-spacing:.5px;
  display:flex;align-items:center;gap:10px;cursor:pointer; transition: transform 0.2s;}
.crest:hover { transform: scale(1.02); }
.crest small {color:var(--chalk-dim);font-weight:500;font-size:1rem;letter-spacing:2px;text-transform:uppercase}
.hud .stat {display:flex;align-items:center;gap:6px;font-family:ui-sans-serif,sans-serif;
  font-size:.85rem;background:rgba(8,42,46,.8);border:1px solid rgba(111,219,161,.25);
  padding:6px 12px;border-radius:999px; transition: background 0.3s;}
.hud .stat:hover { background:rgba(111,219,161,.15); }
.hud .stat b {color:var(--aqua)}
.hud .spacer {flex:1}
.power-wrap {flex-basis:100%;display:flex;align-items:center;gap:12px;margin-top:4px}
.power-label {font-family:ui-sans-serif,sans-serif;font-size:.65rem;letter-spacing:2px;
  text-transform:uppercase;color:var(--gold);white-space:nowrap}
.power-bar {flex:1;height:10px;border-radius:6px;background:#06231f;overflow:hidden;
  border:1px solid rgba(100, 191, 233, 0.35); box-shadow: inset 0 2px 4px rgba(0,0,0,0.5)}
.power-fill {height:100%;width:0%;border-radius:6px;
  background:linear-gradient(90deg,var(--mint),var(--emerald),var(--aqua),var(--gold));
  transition:width .8s cubic-bezier(.34,1.56,.64,1); /* Bouncier fill transition */}

/* ---------- generic ---------- */
.card {
  background:linear-gradient(160deg,rgba(11,26,24,.85),rgba(2,29,34,.95));
  border:1px solid rgba(111,219,161,.15);border-radius:20px;padding:26px 30px;margin:20px 0;
  box-shadow:0 18px 50px -25px rgba(0,0,0,0.7);
  transition: transform 0.3s ease, box-shadow 0.3s ease; /* Dynamic card feel */
}
.card:hover {
  box-shadow:0 25px 60px -20px rgba(0,0,0,0.9);
}
.eyebrow {font-family:ui-sans-serif,sans-serif;font-size:.7rem;letter-spacing:3px;
  text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.muted {color:var(--chalk-dim)}
.btn {display:inline-flex;align-items:center;gap:8px;font-family:ui-sans-serif,sans-serif;
  font-weight:600;font-size:.95rem;border:none;border-radius:12px;padding:12px 22px;
  background:linear-gradient(180deg,var(--fern),var(--slate));color:var(--chalk);
  border:1px solid rgba(127,245,200,.3);
  transition:all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); /* Spring physics on hover */}
.btn:hover {transform:translateY(-3px) scale(1.02);box-shadow:0 12px 28px -10px var(--emerald); border-color:var(--emerald);}
.btn:active {transform:translateY(0) scale(0.98);box-shadow:0 5px 15px -8px var(--emerald);}
.btn.gold {background:linear-gradient(180deg,var(--gold),var(--gold2));color:#1a1305;border-color:rgba(255,255,255,.4)}
.btn.gold:hover {box-shadow:0 12px 28px -10px var(--gold); border-color:#fff;}
.btn.ghost {background:transparent;border:1px solid rgba(127,245,200,.3);color:var(--aqua)}
.btn.ghost:hover {background: rgba(127,245,200,.1); box-shadow:none;}
.btn:disabled {opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.row {display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.right {margin-left:auto}
.pill {display:inline-block;font-family:ui-sans-serif,sans-serif;font-size:.7rem;
  letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;border-radius:999px;
  background:rgba(111,219,161,.14);color:var(--emerald);border:1px solid rgba(111,219,161,.3)}
.pill.gold {background:rgba(233,196,106,.14);color:var(--gold);border-color:rgba(233,196,106,.4)}
.hide {display:none!important}

/* ---------- screens ---------- */
.screen {animation:fade .5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards}
@keyframes fade {from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:none}}

/* ---------- title ---------- */
.title-hero {text-align:center;padding:60px 10px 30px}
.title-hero .king {font-size:4rem;line-height:1;margin:0 0 8px;
  background:linear-gradient(180deg,#fff,var(--aqua) 40%,var(--emerald) 70%,var(--gold));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 0 50px rgba(127,245,200,.2);
  letter-spacing: -1px;}
.title-hero .sub {font-family:ui-sans-serif,sans-serif;letter-spacing:5px;text-transform:uppercase;
  font-size:.75rem;color:var(--gold)}
.title-hero p.lead {max-width:700px;margin:20px auto 0;color:var(--chalk-dim);font-size:1.1rem; line-height: 1.7;}

/* ---------- map ---------- */
.realm-grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-top:10px}
.realm {position:relative;border-radius:20px;padding:24px;overflow:hidden;cursor:pointer;
  border:1px solid rgba(127,245,200,.2);
  background:linear-gradient(160deg,rgba(12,55,54,.6),rgba(2,21,34,.9));
  transition:all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);}
.realm:hover {transform:translateY(-6px) scale(1.02);box-shadow:0 22px 45px -15px var(--emerald); border-color: rgba(127,245,200,.5);}
.realm.locked {filter:grayscale(.7) brightness(.6);cursor:not-allowed}
.realm.locked:hover {transform:none; box-shadow:none; border-color: rgba(127,245,200,.2);}
.realm .rn {font-family:ui-sans-serif,sans-serif;font-size:.65rem;letter-spacing:2px;color:var(--gold);text-transform:uppercase}
.realm h3 {margin:8px 0 6px;font-size:1.3rem}
.realm .desc {font-size:.9rem;color:var(--chalk-dim);min-height:48px}
.realm .seal {position:absolute;top:16px;right:18px;font-size:1.6rem;opacity:.9; transition: transform 0.3s;}
.realm:hover .seal {transform: scale(1.1) rotate(5deg);}
.realm .prog {height:6px;border-radius:5px;background:#06231f;margin-top:16px;overflow:hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);}
.realm .prog>i {display:block;height:100%;background:linear-gradient(90deg,var(--mint),var(--aqua));width:0%}
.realm .status {font-family:ui-sans-serif,sans-serif;font-size:.75rem;color:var(--emerald);margin-top:8px; font-weight: 600;}

/* ---------- chalkboard ---------- */
.board {background:
    repeating-linear-gradient(135deg,rgba(255,255,255,.012) 0 2px,transparent 2px 7px),
    radial-gradient(120% 120% at 30% 0%,#13312a 0%,#0a2520 55%,#071b18 100%);
  border:12px solid #2a1c0e;border-radius:12px;color:var(--chalk);
  padding:28px 30px;margin:20px 0;position:relative;
  box-shadow:inset 0 0 80px rgba(0,0,0,.6),0 16px 40px -15px rgba(0,0,0,0.8);
  font-family:"Bradley Hand","Segoe Print",ui-rounded,"Comic Sans MS",cursive}
.board::after {content:"";position:absolute;left:16px;right:16px;bottom:-24px;height:10px;
  background:linear-gradient(180deg,#3a2814,#1c1308);border-radius:4px;box-shadow:0 8px 15px -4px #000}
.board .chalk-h {font-size:1.25rem;color:var(--aqua);letter-spacing:.5px;
  text-shadow:0 0 10px rgba(127,245,200,.3);margin:0 0 8px}
.board .formula {font-size:1.25rem;text-align:center;margin:12px 0;letter-spacing:.5px;
  color:#fff;text-shadow:0 0 8px rgba(255,255,255,.2)}
.board .formula .em {color:var(--aqua)}
.board .formula .go {color:var(--gold)}
.board small.handnote {display:block;text-align:center;color:var(--chalk-dim);font-size:.85rem}

/* ---------- memorize ---------- */
.memo {border-left:4px solid var(--gold);background:linear-gradient(90deg,rgba(233,196,106,.15),rgba(233,196,106,.02));
  border-radius:0 12px 12px 0;padding:16px 20px;margin:16px 0; box-shadow: inset 0 0 20px rgba(233,196,106,.05);}
.memo .tag {font-family:ui-sans-serif,sans-serif;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--gold);display:flex;align-items:center;gap:8px;margin-bottom:8px; font-weight:600;}
.memo .word {font-weight:700;color:#fff}
.memo .quote {font-size:1.05rem;font-style:italic;color:#fdf3d6}
.translate {background:rgba(111,219,161,.08);border:1px dashed rgba(111,219,161,.4);
  border-radius:12px;padding:14px 18px;margin:12px 0;font-family:ui-sans-serif,sans-serif;font-size:.95rem}
.translate b {color:var(--emerald)}

/* ---------- why ---------- */
.why {margin:12px 0}
.why>button {font-family:ui-sans-serif,sans-serif;font-size:.85rem;font-weight:600;
  background:rgba(127,245,200,.08);border:1px solid rgba(127,245,200,.3);color:var(--aqua);
  border-radius:999px;padding:8px 16px; transition: all 0.2s;}
.why>button:hover {background:rgba(127,245,200,.2); transform: scale(1.02);}
.why .ans {margin-top:10px;padding:14px 18px;border-radius:12px;background:rgba(2,29,34,.8);
  border:1px solid rgba(111,219,161,.2);font-family:ui-sans-serif,sans-serif;font-size:.95rem;color:var(--chalk-dim);
  box-shadow: 0 10px 20px -10px rgba(0,0,0,0.5);}
.why .ans b {color:var(--chalk)}

/* ---------- lesson nav ---------- */
.lesson-head {display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:10px}
.steps {display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 10px}
.steps .dot {width:auto;padding:5px 12px;border-radius:10px;font-family:ui-sans-serif,sans-serif;
  font-size:.75rem;background:rgba(8,42,46,.7);border:1px solid rgba(111,219,161,.2);color:var(--chalk-dim);
  transition: all 0.3s;}
.steps .dot.active {background:rgba(111,219,161,.2);color:#fff;border-color:var(--emerald); box-shadow: 0 0 10px rgba(111,219,161,.2);}
.steps .dot.done {color:var(--emerald)}
.panel-nav {display:flex;gap:14px;margin-top:24px;align-items:center}

/* ---------- quiz ---------- */
.quiz .opt {display:block;width:100%;text-align:left;font-family:ui-sans-serif,sans-serif;
  background:rgba(8,42,46,.6);border:1px solid rgba(111,219,161,.22);color:var(--chalk);
  border-radius:12px;padding:14px 18px;margin:10px 0;font-size:.95rem;transition:all .2s cubic-bezier(0.25, 0.8, 0.25, 1);}
.quiz .opt:hover {border-color:var(--emerald);background:rgba(12,55,54,.8); transform: translateX(5px);}
.quiz .opt.correct {border-color:var(--emerald);background:rgba(111,219,161,.18); transform: none;}
.quiz .opt.wrong {border-color:var(--danger);background:rgba(217,138,106,.16); transform: none;}
.quiz .opt.dim {opacity:.4; transform: none;}
.feedback {font-family:ui-sans-serif,sans-serif;font-size:.95rem;margin-top:12px;padding:12px 16px;border-radius:12px; animation: fade 0.3s ease forwards;}
.feedback.ok {background:rgba(111,219,161,.14);border:1px solid var(--emerald);color:#dffaec}
.feedback.no {background:rgba(217,138,106,.14);border:1px solid var(--danger);color:#fbe6dc}

/* ---------- ordering challenge ---------- */
.order-list {list-style:none;padding:0;margin:14px 0}
.order-list li {font-family:ui-sans-serif,sans-serif;font-size:.95rem;background:rgba(8,42,46,.8);
  border:1px solid rgba(111,219,161,.25);border-radius:12px;padding:12px 16px;margin:8px 0;
  display:flex;align-items:center;gap:12px;cursor:grab; transition: transform 0.2s, box-shadow 0.2s;}
.order-list li:hover {transform: scale(1.01); box-shadow: 0 5px 15px -5px rgba(111,219,161,.3);}
.order-list li:active {cursor:grabbing;}
.order-list li .gripn {font-weight:800;color:var(--gold);min-width:24px; font-size:1.1rem;}
.order-list li.dragging {opacity:.5; transform: scale(1.02); box-shadow: 0 15px 30px -10px rgba(0,0,0,0.5);}
.order-list li.ok {border-color:var(--emerald); background:rgba(111,219,161,.1);}
.order-list li.bad {border-color:var(--danger); background:rgba(217,138,106,.1);}

/* ---------- visualizer ---------- */
.viz {font-family:ui-sans-serif,sans-serif}
.viz .controls {display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin:14px 0}
.viz .narrate {background:rgba(2,29,34,.85);border:1px solid rgba(111,219,161,.25);
  border-radius:14px;padding:16px 20px;font-size:1rem;min-height:70px;margin:14px 0;
  box-shadow: inset 0 0 15px rgba(0,0,0,0.5); line-height: 1.5;}
.viz .narrate b {color:var(--aqua)}
.viz .narrate .hl {color:var(--gold);font-weight:700}
.tasktable {width:100%;border-collapse:collapse;font-size:.9rem;margin:12px 0}
.tasktable th,.tasktable td {border:1px solid rgba(111,219,161,.2);padding:10px;text-align:center}
.tasktable th {color:var(--gold);font-weight:600;background:rgba(8,42,46,.7)}
.tasktable td.cur {background:rgba(233,196,106,.2);font-weight:700;color:#fff}
.tasktable tr.inH {background:rgba(111,219,161,.12)}
.tasktable tr.removed {opacity:.45;text-decoration:line-through}
.timeline {position:relative;height:70px;border-radius:10px;background:#06231f;
  border:1px solid rgba(111,219,161,.25);margin:14px 0;overflow:hidden; box-shadow: inset 0 2px 8px rgba(0,0,0,0.6);}
.tlblock {position:absolute;top:10px;height:34px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:.8rem;font-weight:700;color:#06231f;
  background:linear-gradient(180deg,var(--emerald),var(--mint));border:1px solid #fff3;overflow:hidden;
  transition: all 0.3s ease;}
.tlblock.late {background:linear-gradient(180deg,var(--danger),#b56b4f);color:#fff}
.tldead {position:absolute;top:0;bottom:0;width:2px;background:var(--gold); z-index: 10;}
.tldead span {position:absolute;top:48px;left:-10px;font-size:.65rem;color:var(--gold);white-space:nowrap; font-weight:bold;}
.varbox {display:flex;gap:12px;flex-wrap:wrap;margin:12px 0}
.varbox .v {background:rgba(8,42,46,.85);border:1px solid rgba(111,219,161,.25);border-radius:10px;
  padding:8px 14px;font-size:.9rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3);}
.varbox .v b {color:var(--aqua)}
.heapview {display:flex;gap:10px;flex-wrap:wrap;margin:12px 0;min-height:48px;align-items:center; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px;}
.heapchip {background:linear-gradient(180deg,var(--fern),var(--slate));border:1px solid rgba(127,245,200,.4);
  border-radius:10px;padding:8px 14px;font-size:.9rem;font-weight:600; box-shadow: 0 4px 8px rgba(0,0,0,0.4);
  animation: fade 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;}
.heapchip.max {background:linear-gradient(180deg,var(--danger),#a85f44);border-color:#fff5}
svg.graph {width:100%;height:auto;background:#06231f;border-radius:14px;border:1px solid rgba(111,219,161,.25); box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);}
.legend {display:flex;gap:16px;flex-wrap:wrap;font-size:.85rem;color:var(--chalk-dim);margin-top:10px}
.legend span {display:inline-flex;align-items:center;gap:6px}
.swatch {width:16px;height:10px;border-radius:4px;display:inline-block}

/* toast + reward */
.toast {position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(40px);
  background:linear-gradient(180deg,var(--gold),var(--gold2));color:#1a1305;font-weight:700;
  font-family:ui-sans-serif,sans-serif;padding:14px 24px;border-radius:14px;opacity:0;
  box-shadow:0 18px 40px -10px rgba(0,0,0,0.8);z-index:100;transition:.4s cubic-bezier(0.34, 1.56, 0.64, 1);font-size:1rem;max-width:90vw}
.toast.show {transform:translateX(-50%) translateY(0);opacity:1}

/* badges */
.badge-row {display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.badge {font-family:ui-sans-serif,sans-serif;font-size:.8rem;font-weight:600;padding:8px 14px;border-radius:999px;
  background:rgba(233,196,106,.15);border:1px solid rgba(233,196,106,.5);color:var(--gold); transition: transform 0.2s;}
.badge:hover:not(.locked) { transform: scale(1.05); }
.badge.locked {opacity:.35;filter:grayscale(1)}

/* exam */
.checklist {list-style:none;padding:0;margin:14px 0}
.checklist li {font-family:ui-sans-serif,sans-serif;display:flex;gap:12px;align-items:flex-start;
  padding:12px 16px;margin:8px 0;border-radius:12px;background:rgba(8,42,46,.65);
  border:1px solid rgba(111,219,161,.2);font-size:.95rem; transition: background 0.2s;}
.checklist li:hover { background:rgba(8,42,46,.9); }
.checklist input {margin-top:4px;accent-color:var(--emerald);width:20px;height:20px;flex:none; cursor:pointer;}
.examscore {font-size:1.6rem;font-weight:800;color:var(--gold);text-align:center;margin:14px}

@media(max-width:768px){
  .wrap{padding:16px 16px 90px}
  .title-hero .king{font-size:3rem}
  .board .formula{font-size:1.05rem}
  .hud { margin: -16px -16px 20px; padding: 10px 14px; }
  .realm-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="hud" id="hud">
  <div class="crest" onclick="go('map')"><small>♛ greedy algorithms</small></div>
  <div class="spacer" style="flex:1"></div>
  <div class="stat" title="Experience">✦ XP <b id="s-xp">0</b></div>
  <div class="stat" title="Crowns earned for mastering realms">♛ <b id="s-crowns">0</b></div>
  <div class="stat" title="Knowledge Gems for correct answers">◆ <b id="s-gems">0</b></div>
  <div class="stat" title="Your rank">Rank <b id="s-rank">Serf</b></div>
  <div class="power-wrap">
    <span class="power-label">Power</span>
    <div class="power-bar"><div class="power-fill" id="powerfill"></div></div>
  </div>
</div>

<div class="wrap" id="app"></div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   STATE & ECONOMY
============================================================ */
const RANKS=[[0,"Serf"],[40,"Squire"],[110,"Baron"],[210,"Duke"],[340,"Archduke"],[500,"Tyrant-King"],[700,"God-Emperor of Greed"]];
const POWER_MAX=700;
let S={
  xp:0,crowns:0,gems:0,
  unlocked:{codex:true,r1:true,r2:false,r3:false,exam:false},
  done:{codex:false,r1:false,r2:false,r3:false},
  badges:{},
  answered:{} // track quiz ids answered correctly
};
function rankOf(xp){let r=RANKS[0][1];for(const[t,n]of RANKS)if(xp>=t)r=n;return r;}
function refreshHUD(){
  document.getElementById('s-xp').textContent=S.xp;
  document.getElementById('s-crowns').textContent=S.crowns;
  document.getElementById('s-gems').textContent=S.gems;
  document.getElementById('s-rank').textContent=rankOf(S.xp);
  document.getElementById('powerfill').style.width=Math.min(100,(S.xp/POWER_MAX)*100)+'%';
}
let toastT;
function toast(msg){
  const t=document.getElementById('toast');t.innerHTML=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);

function orderingChallenge(id,title,correctSteps){
  // shuffle
  const idx=correctSteps.map((_,i)=>i);
  for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
  const lis=idx.map(i=>`<li draggable="true" data-correct="${i}"><span class="gripn">⠿</span><span>${correctSteps[i]}</span></li>`).join('');
  return `<div class="card" id="ord${id}">
    <div class="eyebrow">🛠 Forge the Algorithm</div>
    <div class="sans" style="margin-bottom:6px; font-size:1.05rem; font-weight:600;">${title}</div>
    <div class="muted sans" style="font-size:.9rem;margin-bottom:12px">Drag the steps into the exact order you would say them at the board.</div>
    <ul class="order-list" id="ordlist${id}">${lis}</ul>
    <button class="btn gold" onclick="checkOrder(${id})">Check order</button>
    <div class="feedback hide" id="ordfb${id}"></div>
  </div>`;
}
function initOrderDrag(id){
  const list=document.getElementById('ordlist'+id);if(!list)return;
  let dragEl=null;
  list.querySelectorAll('li').forEach(li=>{
    li.addEventListener('dragstart',()=>{dragEl=li;li.classList.add('dragging');});
    li.addEventListener('dragend',()=>{li.classList.remove('dragging');});
  });
  list.addEventListener('dragover',e=>{
    e.preventDefault();
    const after=[...list.querySelectorAll('li:not(.dragging)')].reduce((closest,child)=>{
      const box=child.getBoundingClientRect();const offset=e.clientY-box.top-box.height/2;
      if(offset<0&&offset>closest.offset)return{offset,element:child};return closest;
    },{offset:-Infinity}).element;
    if(!dragEl)return;
    if(after)list.insertBefore(dragEl,after);else list.appendChild(dragEl);
  });
}
function checkOrder(id){
  const list=document.getElementById('ordlist'+id);
  const lis=[...list.querySelectorAll('li')];
  let ok=true;
  lis.forEach((li,pos)=>{
    li.classList.remove('ok','bad');
    if(+li.dataset.correct===pos)li.classList.add('ok');else{li.classList.add('bad');ok=false;}
  });
  const fb=document.getElementById('ordfb'+id);fb.classList.remove('hide');
  if(ok){fb.className='feedback ok';fb.innerHTML='✅ Perfect sequence — that is exactly the algorithm.';
    if(!S.answered['ord'+id]){S.answered['ord'+id]=1;award(14,2,0);}}
  else{fb.className='feedback no';fb.innerHTML='✗ Some steps are out of place (red). Reorder and try again.';}
}

/* ============================================================
   VISUALIZER 1 — Minimal maximum lateness
============================================================ */
const VIZ1_TASKS=[{n:1,t:3,d:6},{n:2,t:2,d:8},{n:3,t:1,d:9},{n:4,t:4,d:9},{n:5,t:3,d:14},{n:6,t:2,d:15}];
function viz1(){
  let step=-1; // -1 = nothing scheduled
  const host=document.getElementById('viz1host');if(!host)return;
  const maxTime=18;
  function render(){
    // compute states up to step
    let s=0;const blocks=[];let L=0;let cur=null;
    for(let k=0;k<=step;k++){
      const T=VIZ1_TASKS[k];const start=s;const fin=s+T.t;const lateness=Math.max(0,fin-T.d);
      blocks.push({...T,start,fin,lateness});s=fin;L=Math.max(L,lateness);
      if(k===step)cur={...T,start,fin,lateness};
    }
    // table
    const rows=VIZ1_TASKS.map((T,k)=>{
      const isCur=k===step;const scheduled=k<=step;
      const b=blocks.find(x=>x.n===T.n);
      return `<tr>
        <td class="${isCur?'cur':''}">a${T.n}</td>
        <td>${T.t}</td><td>${T.d}</td>
        <td>${scheduled?b.start:'—'}</td>
        <td class="${isCur?'cur':''}">${scheduled?b.fin:'—'}</td>
        <td style="color:${scheduled&&b.lateness>0?'var(--danger)':'var(--emerald)'}; font-weight:bold;">${scheduled?b.lateness:'—'}</td>
      </tr>`;
    }).join('');
    // timeline
    const px=t=>(t/maxTime*100);
    let tl=blocks.map(b=>`<div class="tlblock ${b.lateness>0?'late':''}" style="left:${px(b.start)}%;width:${px(b.t)}%" title="a${b.n}: [${b.start},${b.fin}]">a${b.n}</div>`).join('');
    // deadline markers for scheduled tasks
    tl+=blocks.map(b=>`<div class="tldead" style="left:${px(b.d)}%"><span>d${b.n}=${b.d}</span></div>`).join('');
    // narrate
    let nar;
    if(step<0)nar=`Tasks are already sorted by deadline: <span class="hl">d1 ≤ d2 ≤ … ≤ d6</span>. The resource starts at time 0 with <b>no idle time</b>. Press <b>Step</b> to schedule each task back-to-back.`;
    else{
      const b=cur;
      nar=`Scheduling <b>a${b.n}</b>: start <b>s${b.n}=${b.start}</b> (the previous finish), so finish <b>f${b.n}=s${b.n}+t${b.n}=${b.start}+${b.t}=${b.fin}</b>. Deadline is d${b.n}=${b.d}. `;
      if(b.lateness>0)nar+=`Since f${b.n}=${b.fin} &gt; d${b.n}=${b.d}, it is <span class="hl" style="color:var(--danger)">late</span>: l${b.n}=f${b.n}−d${b.n}=${b.fin}−${b.d}=<b>${b.lateness}</b>. `;
      else nar+=`Since f${b.n}=${b.fin} ≤ d${b.n}=${b.d}, it is <span style="color:var(--emerald)">on time</span>: <b>l${b.n}=0</b>. `;
      nar+=`Current maximum lateness <b>L = ${L}</b>.`;
      if(step===VIZ1_TASKS.length-1)nar+=` <br><br><span class="hl">Done.</span>  minimum possible maximum lateness <b>L = ${L}</b> (here, only a4 is late by 1).`;
    }
    host.innerHTML=`
      <div class="narrate">${nar}</div>
      <table class="tasktable"><tr><th>task</th><th>t<sub>i</sub></th><th>d<sub>i</sub></th><th>s<sub>i</sub></th><th>f<sub>i</sub></th><th>l<sub>i</sub></th></tr>${rows}</table>
      <div class="timeline">${tl}</div>
      <div class="varbox">
        <div class="v">next start <b>s = ${step<0?0:blocks[blocks.length-1].fin}</b></div>
        <div class="v">L = max lateness <b>${step<0?0:L}</b></div>
      </div>
      <div class="legend">
        <span><span class="swatch" style="background:var(--emerald)"></span>on time</span>
        <span><span class="swatch" style="background:var(--danger)"></span>late</span>
        <span><span class="swatch" style="background:var(--gold);width:3px"></span>deadline d<sub>i</sub></span>
      </div>
      <div class="controls">
        <button class="btn" onclick="viz1Ctl('back')" ${step<0?'disabled':''}>‹ Undo</button>
        <button class="btn gold" onclick="viz1Ctl('step')" ${step>=VIZ1_TASKS.length-1?'disabled':''}>Step ›</button>
        <button class="btn ghost" onclick="viz1Ctl('reset')">↺ Reset</button>
      </div>`;
  }
  window.viz1Ctl=(a)=>{
    if(a==='step'&&step<VIZ1_TASKS.length-1)step++;
    if(a==='back'&&step>=0)step--;
    if(a==='reset')step=-1;
    render();
    if(a==='step'&&step===VIZ1_TASKS.length-1)award(6,1,0);
  };
  render();
}

/* ============================================================
   VISUALIZER 2 — Maximum tasks, no lateness (heap)
============================================================ */
const VIZ2_TASKS=[{n:1,t:2,d:3},{n:2,t:4,d:5},{n:3,t:1,d:6},{n:4,t:3,d:7},{n:5,t:1,d:8}];
function viz2(){
  let step=-1; // index processed
  const host=document.getElementById('viz2host');if(!host)return;
  function compute(){
    let H=[];let removed=[];let total=0;const log=[];
    for(let i=0;i<=step;i++){
      const T=VIZ2_TASKS[i];H.push(T);total+=T.t;
      let note=`Add a${T.n} → total processing time = ${total}. `;
      if(total>T.d){
        // remove longest
        let mi=0;for(let j=1;j<H.length;j++)if(H[j].t>H[mi].t)mi=j;
        const r=H[mi];note+=`Σt = ${total} &gt; d${T.n}=${T.d}, so remove the <span style="color:var(--danger);font-weight:bold;">LONGEST</span> task in H → a${r.n} (t=${r.t}).`;
        total-=r.t;H.splice(mi,1);removed.push(r.n);
      } else {
        note+=`Σt = ${total} ≤ d${T.n}=${T.d}: keep all. Nothing removed.`;
      }
      log.push({i,H:H.map(x=>x.n),total,note,removed:[...removed]});
    }
    return {H,removed,total,log};
  }
  function render(){
    const st=compute();
    const last=st.log[st.log.length-1];
    const rows=VIZ2_TASKS.map((T,k)=>{
      const inH=st.H.find(x=>x.n===T.n);
      const rem=st.removed.includes(T.n);
      const cls=k===step?'':'';

/* ============================================================
   VISUALIZER 3 — Clustering via Kruskal (stop at k components)
============================================================ */
const VIZ3_NODES=[
  {n:1,x:70,y:70},{n:2,x:130,y:95},
  {n:3,x:310,y:60},{n:4,x:370,y:95},
  {n:5,x:560,y:70},{n:6,x:620,y:100}
];
// edges with given "distances" (weights). cheap within clusters, expensive across.
const VIZ3_EDGES=[
  {a:1,b:2,w:1},{a:3,b:4,w:2},{a:5,b:6,w:3},
  {a:2,b:3,w:8},{a:4,b:5,w:10},
  {a:1,b:3,w:11},{a:2,b:4,w:9},{a:4,b:6,w:12},{a:1,b:6,w:20}
];
const VIZ3_K=3;
function viz3(){
  // Kruskal: sort edges, add if joins different comps, stop at k comps
  const sorted=[...VIZ3_EDGES].sort((a,b)=>a.w-b.w);
  let parent={};VIZ3_NODES.forEach(n=>parent[n.n]=n.n);
  function find(x){while(parent[x]!==x){parent[x]=parent[parent[x]];x=parent[x];}return x;}
  // precompute the kruskal trace (mst edges in order, and the stopping edge)
  const trace=[];let comps=VIZ3_NODES.length;
  let p2={};VIZ3_NODES.forEach(n=>p2[n.n]=n.n);
  function f2(x){while(p2[x]!==x){p2[x]=p2[p2[x]];x=p2[x];}return x;}
  let mstEdges=[];let stopEdge=null;
  for(const e of sorted){
    const ra=f2(e.a),rb=f2(e.b);
    if(ra!==rb){
      if(comps===VIZ3_K){stopEdge=e;break;} // this is the edge we would add next = spacing
      p2[ra]=rb;mstEdges.push(e);comps--;
    }
  }
  // spacing d* = weight of the edge we'd add next once at k comps = (k-1)th most expensive MST edge
  const dstar=stopEdge?stopEdge.w:null;
  let step=-1; // -1 nothing; index into "added" edges
  const host=document.getElementById('viz3host');if(!host)return;
  function compsAt(s){
    let p={};VIZ3_NODES.forEach(n=>p[n.n]=n.n);
    function ff(x){while(p[x]!==x){p[x]=p[p[x]];x=p[x];}return x;}
    for(let k=0;k<=s&&k<mstEdges.length;k++){const e=mstEdges[k];p[ff(e.a)]=ff(e.b);}
    // group
    const groups={};VIZ3_NODES.forEach(n=>{const r=ff(n.n);(groups[r]=groups[r]||[]).push(n.n);});
    return {ff,groups:Object.values(groups)};
  }
  const palette=['#6FDBA1','#E9C46A','#7FF5C8','#74B28D','#d98a6a'];
  function render(){
    const added=step<0?[]:mstEdges.slice(0,step+1);
    const {ff,groups}=compsAt(step);
    const colorOf={};groups.forEach((g,gi)=>g.forEach(n=>colorOf[n]=palette[gi%palette.length]));
    // svg edges
    const edgeSvg=mstEdges.map((e,i)=>{
      const A=VIZ3_NODES.find(n=>n.n===e.a),B=VIZ3_NODES.find(n=>n.n===e.b);
      const on=i<=step;
      return `<line x1="${A.x}" y1="${A.y}" x2="${B.x}" y2="${B.y}" stroke="${on?'var(--emerald)':'#2c4b44'}" stroke-width="${on?3:1.5}" stroke-dasharray="${on?'0':'5 5'}"/>
      <text x="${(A.x+B.x)/2}" y="${(A.y+B.y)/2-6}" fill="${on?'#fff':'#5a7d72'}" font-size="14" font-weight="600" text-anchor="middle">${e.w}</text>`;
    }).join('');
    const nodeSvg=VIZ3_NODES.map(n=>`
      <circle cx="${n.x}" cy="${n.y}" r="18" fill="${colorOf[n.n]||'#3a5d54'}" stroke="#02211f" stroke-width="2"/>
      <text x="${n.x}" y="${n.y+5}" text-anchor="middle" font-size="13" font-weight="700" fill="#02211f">p${n.n}</text>`).join('');
    let nar;
    if(step<0)nar=`Build a complete weighted graph: vertices are objects, an edge's weight is the distance. Run <b>Kruskal's MST</b> — add the cheapest edge that joins two different components — but <span class="hl">stop once ${VIZ3_K} components remain</span>. Press <b>Step</b>.`;
    else if(step<mstEdges.length){
      const e=mstEdges[step];
      nar=`Add cheapest safe edge <b>(p${e.a}, p${e.b})</b> with weight <b>${e.w}</b> — it merges two components. Components now: <b>${groups.length}</b>.`;
      if(groups.length===VIZ3_K)nar+=` <span class="hl">We have reached k=${VIZ3_K} components → STOP.</span>`;
    }
    if(groups.length===VIZ3_K){
      nar+=`<br><br>The next edge Kruskal <i>would</i> have added is <b>(p${stopEdge.a},p${stopEdge.b})</b> with weight <b style="color:var(--gold)">${stopEdge.w}</b>. That weight is the <span style="color:var(--gold)">spacing d* = ${dstar}</span> — the (k−1)th most expensive edge of the full MST, i.e. the smallest distance between two different clusters. <br>Clusters: ${groups.map(g=>'{'+g.map(x=>'p'+x).join(',')+'}').join(' ')}`;
    }
    host.innerHTML=`
      <div class="narrate">${nar}</div>
      <svg class="graph" viewBox="0 0 700 170">${edgeSvg}${nodeSvg}</svg>
      <div class="varbox">
        <div class="v">components <b>${step<0?VIZ3_NODES.length:groups.length}</b> / target k=${VIZ3_K}</div>
        ${groups.length===VIZ3_K?`<div class="v" style="border-color:var(--gold);">spacing d* <b style="color:var(--gold);">${dstar}</b></div>`:''}
      </div>
      <div class="controls">
        <button class="btn" onclick="viz3Ctl('back')" ${step<0?'disabled':''}>‹ Undo</button>
        <button class="btn gold" onclick="viz3Ctl('step')" ${step>=mstEdges.length-1?'disabled':''}>Step ›</button>
        <button class="btn ghost" onclick="viz3Ctl('reset')">↺ Reset</button>
      </div>`;
  }
  window.viz3Ctl=(a)=>{
    if(a==='step'&&step<mstEdges.length-1)step++;
    if(a==='back'&&step>=0)step--;
    if(a==='reset')step=-1;
    render();
    if(a==='step'&&step===mstEdges.length-1)award(6,1,0);
  };
  render();
}

        <div class="eyebrow">Step 1 — What is this algorithm for?</div>

        <p class="sans">Same single resource — but now the rule flips. <b>No task may ever be late.</b> You cannot run everything, so you <b>select the largest possible set</b> of tasks that all finish on time. Greed here means hoarding as many tasks as you can.</p>
        <div class="translate"><b>Example uses:</b> a freelancer with one workbench choosing the most gigs they can finish by each client's deadline; a single conference room booking the most meetings that all fit before their cutoffs; one GPU accepting the most jobs that all meet their SLA. "One server, drop some jobs, but every accepted job must be on time — take as many as possible."</div>
        <div class="memo"><div class="tag">★ say this out loud</div>
        <div class="quote">"Find a subset of <span class="word">maximum cardinality</span> such that <span class="word">no accepted task is late</span> and the intervals are non-overlapping."</div></div>
        ${why('How is this different from Realm I?','Realm I: <i>every</i> task runs, lateness allowed, minimise the worst lateness. Realm II: lateness <i>forbidden</i>, so we drop tasks, and we maximise how many we keep. Opposite objective, same machine.')}
      </div>`},
    {nav:'Problem (board)',html:`
      <div class="card">
        <div class="eyebrow">Step 2 — Write the mathematical problem on the board</div>
        <div class="board">
          <div class="chalk-h">Find a subset of maximum size</div>
          <div class="formula">{a<sub>i₁</sub>, a<sub>i₂</sub>, …, a<sub>i<sub>k</sub></sub>} ⊆ A &nbsp; with start s<sub>iⱼ</sub> ≥ 0, finish f<sub>iⱼ</sub></div>
          <div class="formula go">f<sub>iⱼ</sub> − s<sub>iⱼ</sub> = t<sub>iⱼ</sub> &nbsp;and&nbsp; f<sub>iⱼ</sub> ≤ d<sub>iⱼ</sub></div>
          <div class="formula go">intervals [s<sub>iⱼ</sub>,f<sub>iⱼ</sub>] pairwise non-overlapping</div>
          <div class="formula">maximise k (the number of accepted tasks)</div>
        </div>
        <div class="memo"><div class="tag">★ memorize these two conditions</div>
        <div class="quote">"<b>f<sub>iⱼ</sub> − s<sub>iⱼ</sub> = t<sub>iⱼ</sub></b> and <b>f<sub>iⱼ</sub> ≤ d<sub>iⱼ</sub></b> for all j" (no task is late), and "the intervals are <b>pairwise non-overlapping</b>" (one task at a time, no interruptions).</div></div>
        <div class="translate"><b>What the formulas literally say:</b><br>• <b>f<sub>iⱼ</sub> − s<sub>iⱼ</sub> = t<sub>iⱼ</sub></b>: the block we give a task is exactly as long as it needs (it runs without interruption).<br>• <b>f<sub>iⱼ</sub> ≤ d<sub>iⱼ</sub></b>: it finishes <i>at or before</i> its deadline → never late. This is the "no lateness" rule.<br>• <b>pairwise non-overlapping</b>: no two chosen intervals share time → the one machine is never double-booked.<br>• <b>maximise k</b>: keep as many tasks as possible. "Cardinality" just means "how many tasks are in the set."</div>
        ${why('What does "maximum cardinality" mean?','Cardinality = the number of elements in a set. Maximum cardinality subset = the subset containing as many tasks as possible. We are not maximising total time or value — just the <i>count</i> of on-time tasks.')}
      </div>`},
    {nav:'Algorithm',html:`
      <div class="card">
        <div class="eyebrow">Step 3 — The greedy rule (add, then evict the longest)</div>
        <div class="memo"><div class="tag">★ state the algorithm word-for-word</div>
        <div class="quote">"Sort by increasing deadline: d<sub>1</sub> ≤ … ≤ d<sub>n</sub>. Keep a set <b>H</b>, initially ∅. For each i in increasing order, <b>add a<sub>i</sub> to H</b>. If the total processing time of tasks in H <b>exceeds d<sub>i</sub></b> (Σ<sub>a<sub>j</sub>∈H</sub> t<sub>j</sub> &gt; d<sub>i</sub>), <b>remove from H the task with the longest processing time</b>. Finally schedule H by increasing deadline, no idle time, from 0."</div></div>
        <div class="translate"><b>In plain words:</b> go through tasks by deadline. Greedily grab each one. The moment your accepted tasks no longer all fit before the current deadline, throw out the single <b>longest</b> task (it's the biggest time-hog). Keep doing this. Whatever survives in H is your answer.</div>
        <div class="translate"><b>Why "Σ t<sub>j</sub> &gt; d<sub>i</sub>" triggers a removal:</b> because tasks are sorted by deadline, d<sub>i</sub> is the latest deadline among everything currently in H. If the <i>total work</i> in H already passes d<sub>i</sub>, then they can't all fit on time → we must drop one, and dropping the <b>longest</b> frees the most room while costing only one task.</div>
        <div class="memo"><div class="tag">★ key fact to state</div>
        <div class="quote">"In schedule H <b>no task is late</b>, since the algorithm ensures the cumulative processing time never exceeds the current task's deadline."</div></div>
        ${why('Why evict the LONGEST task, not the latest or the one just added?','Removing the longest task removes the most processing time while still only losing one task — the best possible trade for keeping the <i>count</i> high. The proof shows this choice is safe (an optimal solution avoiding that task always exists).')}
      </div>`},
    {nav:'Run it',html:`
      <div class="card">
        <div class="eyebrow">Step 4 — Walk a worked example</div>
        <p class="sans muted">Watch H grow, watch Σt, and watch the eviction fire when Σt &gt; dᵢ. The evicted task is always the longest chip (shown in red in the heap).</p>
        <div class="viz" id="viz2host"></div>
      </div>`,onShow:viz2},
    {nav:'Proof',html:`
      <div class="card">
        <div class="eyebrow">Step 5 — Prove it is optimal (induction + exchange)</div>
        <div class="memo"><div class="tag">★ proof structure — memorize the spine</div>
        <div class="quote">By <b>induction on the number of tasks</b>. Base n = 1 is trivial. Assume it holds for n − 1. If H contains all tasks it is optimal. Otherwise let <b>a<sub>k</sub></b> be the <b>first task removed</b> from H (when adding some a<sub>i</sub>).</div></div>
        <div class="translate"><b>What induction means here, in words:</b> we assume the greedy algorithm is already proven correct on any smaller set of tasks, then show that fact forces it to be correct on the full set. The bridge is the first task we ever throw away, a<sub>k</sub>.</div>
        <div class="memo"><div class="tag">★ the exchange claim — memorize</div>
        <div class="quote">There is an optimal solution O scheduled by increasing deadline, no idle time, from 0, that <b>does not include a<sub>k</sub></b>. Take an optimal O′ that <i>does</i> include a<sub>k</sub>. Since Σ<sub>j=1..i</sub> t<sub>j</sub> &gt; d<sub>i</sub>, some task a<sub>l</sub> among a<sub>1</sub>…a<sub>i</sub> is <b>not</b> in O′. Replace a<sub>k</sub> by a<sub>l</sub> → O.</div></div>
        <div class="translate"><b>Why a missing a<sub>l</sub> must exist:</b> the total time of the first i tasks already exceeds d<sub>i</sub>, so an optimal on-time schedule <i>can't</i> contain all of them — at least one, call it a<sub>l</sub>, is left out. We swap our unwanted a<sub>k</sub> for that a<sub>l</sub>.</div>
        <div class="memo"><div class="tag">★ why the swap is safe — memorize the reason</div>
        <div class="quote">No task a<sub>1</sub>…a<sub>i</sub> in O is late (the choice of i guarantees they fit when scheduled by deadline), and no task a<sub>i+1</sub>…a<sub>n</sub> is late either, <b>since none is scheduled later than in O′, because t<sub>k</sub> ≥ t<sub>l</sub></b>. Thus O is also optimal.</div></div>
        <div class="translate"><b>The crucial "t<sub>k</sub> ≥ t<sub>l</sub>":</b> a<sub>k</sub> was removed for being the <i>longest</i>, so it is at least as long as a<sub>l</sub>. Replacing a long task by a shorter (or equal) one never pushes later tasks further right in time → nothing that was on time becomes late. So O stays valid and just as large.</div>
        <div class="memo"><div class="tag">★ the counting finish — memorize</div>
        <div class="quote">|H| ≤ |O| (O is optimal). Running greedy on A∖{a<sub>k</sub>} gives the same H, optimal for A∖{a<sub>k</sub>} by induction; since O ⊆ A∖{a<sub>k</sub>}, |O| ≤ |H|. Hence <b>|H| = |O|</b>, so H is optimal.</div></div>
        <div class="translate"><b>The squeeze, in words:</b> H can't beat the optimum O, so |H| ≤ |O|. But O avoids a<sub>k</sub>, and on the smaller world A∖{a<sub>k</sub>} our induction says H is already optimal, so O can't beat H either: |O| ≤ |H|. Two ≤'s pointing both ways force <b>equality</b> — H is optimal. <b>Done.</b></div>
        ${why('Why is the base case n = 1 trivial?','With a single task, the only choices are "schedule it" (if it fits before its deadline) or not. Greedy obviously makes the best of one task, so there is nothing to prove.')}
      </div>`},
    {nav:'Runtime',html:`
      <div class="card">
        <div class="eyebrow">Step 6 — Running time</div>
        <div class="board"><div class="formula go">O(n log n)</div>
        <small class="handnote">max-heap operations + sorting</small></div>
        <div class="memo"><div class="tag">★ explain the runtime exactly</div>
        <div class="quote">"Store H in a <b>max-heap by processing time</b>. Inserting the next task and possibly removing the maximum is <b>O(log n)</b>. Checking whether deletion is needed is <b>O(1)</b> using an auxiliary variable for the total processing time. Over all n tasks this is <b>O(n log n)</b>; sorting is also O(n log n); total <b>O(n log n)</b>."</div></div>
        <div class="translate"><b>In words:</b> a max-heap lets us instantly find and remove the longest task (O(log n) each step). We keep a running total of processing time so the "do we need to evict?" check is instant (O(1)). Doing this for all n tasks costs n·log n, the initial sort costs the same, so everything is <b>O(n log n)</b>.</div>
      </div>`},
    {nav:'Drill',html:`
      <div class="card"><div class="eyebrow">⚔ Mastery drills</div></div>
      ${orderingChallenge('r2','Order the algorithm exactly as you would recite it:',
        ['Sort tasks by increasing deadline; set H = ∅.',
         'For each task aᵢ in deadline order, add aᵢ to H.',
         'If the total processing time in H exceeds dᵢ (Σ tⱼ > dᵢ)…',
         '…remove from H the task with the longest processing time.',
         'Finally schedule H by increasing deadline, no idle time, from 0.'])}
      ${quiz({id:'r2q1',prompt:'When the total time in H exceeds the current deadline d_i, which task do we remove?',
        options:['The task just added','The task with the earliest deadline','The task with the LONGEST processing time','A random task'],
        correct:2,explain:'Always remove the longest-processing-time task — it frees the most room while losing only one task.'})}
      ${quiz({id:'r2q2',prompt:'In the proof, the swap of a_k for a_l keeps later tasks on time because…',
        options:['t_k ≥ t_l, so nothing is pushed later','d_k ≥ d_l','a_l has no deadline','they are the same task'],
        correct:0,explain:'a_k was the longest (t_k ≥ t_l), so replacing it with the shorter a_l never delays any later task — no on-time task becomes late.'})}
      ${quiz({id:'r2q3',prompt:'What does the greedy algorithm here maximise?',
        options:['Total processing time scheduled','The number (cardinality) of on-time tasks','The minimum lateness','The number of evictions'],
        correct:1,explain:'It maximises the count of tasks that all finish on time — maximum cardinality, no lateness.'})}
    `,onShow:()=>initOrderDrag('r2')},
    {nav:'Board test',html:`
      <div class="card">
        <div class="eyebrow gold">🏛 Blackboard rehearsal</div>
        <h3>Deliver Realm II from memory</h3>
        <ul class="checklist" id="r2check">
          <li><input type="checkbox"><span><b>Purpose</b>: no lateness allowed, accept the maximum number of tasks — plus an example use.</span></li>
          <li><input type="checkbox"><span><b>Problem</b>: max-cardinality subset, fᵢⱼ − sᵢⱼ = tᵢⱼ, fᵢⱼ ≤ dᵢⱼ, intervals pairwise non-overlapping.</span></li>
          <li><input type="checkbox"><span><b>Algorithm</b>: sort by deadline; H=∅; add each aᵢ; if Σtⱼ > dᵢ remove the longest; schedule H by deadline.</span></li>
          <li><input type="checkbox"><span><b>Example</b> run naming H, Σt, and which task gets evicted and why.</span></li>
          <li><input type="checkbox"><span><b>Proof</b>: induction; first removed task aₖ; exchange aₖ↔aₗ with tₖ ≥ tₗ; counting squeeze |H| = |O|.</span></li>
          <li><input type="checkbox"><span><b>Runtime</b>: max-heap O(log n) per step, O(1) total-time check, O(n log n) overall.</span></li>
        </ul>
        <button class="btn gold" onclick="gradeChecklist('r2check',this)">Grade my rehearsal</button>
        <div class="examscore hide"></div>
      </div>`},
  ]
},

r3:{
  tag:'Realm III',title:'🗺️ The Sundering',relic:'Sceptre of Sundering',
  panels:[
    {nav:'Purpose',html:`
      <div class="card">
        <div class="eyebrow">Step 1 — What is this algorithm for?</div>
        <h3>Clustering of maximum spacing</h3>
        <p class="sans">You are given objects and a notion of <b>distance</b> between them (small distance = similar). You must split them into <b>k groups</b> so that objects in <b>different</b> groups are as <b>far apart</b> as possible. Greed here means repeatedly fusing the two closest things until exactly k empires remain.</p>
        <div class="translate"><b>Example uses:</b> grouping photographs, documents, or microorganisms into coherent categories; segmenting customers; any task where "things in the same group should be alike, things in different groups should be very different." The source's own example: distance between two video frames = number of pixels whose intensity differs by at least some threshold.</div>
        <div class="memo"><div class="tag">★ say this out loud</div>
        <div class="quote">"Divide the objects into groups so that objects within the same group are <span class="word">close together</span> and objects in different groups are <span class="word">far apart</span>; find the k-clustering with <span class="word">maximum spacing</span>."</div></div>
        ${why('Why is finding the best clustering not trivial?','There are <b>exponentially many</b> ways to split objects into k groups. The triumph of this algorithm is finding the maximum-spacing one efficiently, without checking them all.')}
      </div>`},
    {nav:'Problem (board)',html:`
      <div class="card">
        <div class="eyebrow">Step 2 — Write the mathematical problem on the board</div>
        <div class="board">
          <div class="chalk-h">Given</div>
          <div class="formula">integer k, &nbsp; objects U = {p<sub>1</sub>,…,p<sub>n</sub>} with n ≥ k, &nbsp; distance d</div>
          <div class="formula go">d(p<sub>i</sub>,p<sub>j</sub>) ≥ 0</div>
          <div class="formula go">d(p<sub>i</sub>,p<sub>j</sub>) = 0 ⇔ i = j</div>
          <div class="formula go">d(p<sub>i</sub>,p<sub>j</sub>) = d(p<sub>j</sub>,p<sub>i</sub>)</div>
        </div>
        <div class="memo"><div class="tag">★ memorize the three distance axioms</div>
        <div class="quote">d is non-negative; it is zero <b>iff</b> the two objects are identical; and it is symmetric.</div></div>
        <div class="translate"><b>The three axioms in words:</b><br>• <b>d ≥ 0</b>: distance is never negative.<br>• <b>d = 0 ⇔ i = j</b>: distance is zero <i>exactly when</i> it's the same object — different objects always have positive distance.<br>• <b>d(p<sub>i</sub>,p<sub>j</sub>) = d(p<sub>j</sub>,p<sub>i</sub>)</b>: distance from A to B equals B to A (symmetric).</div>
        <div class="board">
          <div class="chalk-h">A k-clustering {C₁,…,C<sub>k</sub>}</div>
          <div class="formula go">C<sub>1</sub> ∪ C<sub>2</sub> ∪ … ∪ C<sub>k</sub> = U</div>
          <div class="formula go">C<sub>i</sub> ∩ C<sub>j</sub> = ∅ &nbsp; (i ≠ j)</div>
          <div class="chalk-h" style="margin-top:10px">Spacing</div>
          <div class="formula go">spacing = min{ d(p<sub>i</sub>,p<sub>j</sub>) : p<sub>i</sub>∈C<sub>s</sub>, p<sub>j</sub>∈C<sub>t</sub>, s ≠ t }</div>
          <div class="formula">goal: <span class="em">maximise the spacing</span></div>
        </div>
        <div class="memo"><div class="tag">★ memorize the definition of spacing</div>
        <div class="quote">"The <b>spacing</b> of a k-clustering is the <b>minimum distance between any pair of objects lying in different clusters</b>." Goal: the clustering of <b>maximum possible spacing</b>.</div></div>
        <div class="translate"><b>What the formulas literally say:</b><br>• <b>C₁ ∪ … ∪ C<sub>k</sub> = U</b>: the groups together cover every object (nothing left out).<br>• <b>C<sub>i</sub> ∩ C<sub>j</sub> = ∅</b>: groups don't overlap (each object in exactly one group). These two = "a valid partition into k non-empty groups."<br>• <b>spacing = min over all cross-group pairs of d</b>: look at every pair of objects that sit in <i>different</i> clusters, take their distances, and keep the <i>smallest</i> one. That smallest cross-cluster distance is the spacing.<br>• <b>maximise spacing</b>: we want even the closest two different-cluster objects to be as far apart as we can manage.</div>
        ${why('Why is spacing a MINIMUM but we MAXIMISE it?','Spacing measures the <i>weakest</i> separation — the closest two points that ended up in different clusters. A good clustering makes even that weakest gap as large as possible, so we maximise the minimum. It is a "max-min" goal.')}
      </div>`},
    {nav:'Algorithm',html:`
      <div class="card">
        <div class="eyebrow">Step 3 — The greedy rule (Kruskal, stopped early)</div>
        <div class="memo"><div class="tag">★ state the algorithm word-for-word</div>
        <div class="quote">"Build a weighted complete graph whose vertices are the objects and whose edge weights are the distances. Run <b>Kruskal's minimum spanning tree algorithm</b> on it, but <b>stop once k connected components are obtained</b>. The vertex sets of the connected components are the k-clustering."</div></div>
        <div class="translate"><b>In plain words:</b> connect every pair of objects with an edge weighted by their distance. Then repeatedly add the <b>cheapest</b> edge that links two so-far-separate groups (that's Kruskal) — but halt the moment you have exactly k groups left. Those k groups are your clusters.</div>
        <div class="memo"><div class="tag">★ the equivalent view — memorize</div>
        <div class="quote">"This is equivalent to constructing the full minimum spanning tree as Kruskal would, then <b>removing the k − 1 most expensive edges</b>."</div></div>
        <div class="translate"><b>Why "remove k − 1 most expensive edges" is the same thing:</b> a full MST on n objects has n−1 edges and is one connected blob. Cutting one edge makes 2 pieces; cutting the k−1 priciest edges makes exactly k pieces. Stopping Kruskal early is just never adding those k−1 expensive edges in the first place.</div>
        ${why('Why use Kruskal / an MST at all?','Kruskal greedily joins the closest still-separate things first. Stopping at k pieces leaves the k−1 <i>largest</i> gaps un-bridged — exactly the cuts that keep different clusters far apart, which is what maximum spacing demands.')}
      </div>`},
    {nav:'Run it',html:`
      <div class="card">
        <div class="eyebrow">Step 4 — Walk a worked example (k = ${VIZ3_K})</div>
        <p class="sans muted">Step through Kruskal adding the cheapest safe edge each time. Watch the component count fall toward k. When it hits k we stop — and the edge we would have added next is exactly the spacing d*.</p>
        <div class="viz" id="viz3host"></div>
      </div>`,onShow:viz3},
    {nav:'Proof',html:`
      <div class="card">
        <div class="eyebrow">Step 5 — Prove the spacing is maximal</div>
        <div class="memo"><div class="tag">★ identify d* — memorize</div>
        <div class="quote">"The spacing of our clustering C is the weight of the <b>(k − 1)th most expensive edge</b> of the minimum spanning tree produced by Kruskal. Let <b>d*</b> denote this weight."</div></div>
        <div class="translate"><b>What d* is, in words:</b> d* is the size of the smallest gap our algorithm chose <i>not</i> to bridge — equivalently the weight of the next edge Kruskal would have added at the stopping moment. That number is exactly the spacing of our clustering C.</div>
        <div class="memo"><div class="tag">★ the comparison setup — memorize the moves</div>
        <div class="quote">Take any other k-clustering C′ ≠ C. Since they differ, some set <b>C<sub>r</sub> ∈ C</b> is <b>not a subset of any set in C′</b>. So C<sub>r</sub> holds two objects <b>p<sub>i</sub>, p<sub>j</sub></b> that land in <b>different</b> clusters of C′ — say p<sub>i</sub> ∈ C′<sub>s</sub>, p<sub>j</sub> ∈ C′<sub>t</sub>, s ≠ t.</div></div>
        <div class="translate"><b>Why such p<sub>i</sub>, p<sub>j</sub> must exist:</b> if every one of our clusters fit neatly inside one of C′'s clusters, the two clusterings would be the same. They aren't, so one of our clusters C<sub>r</sub> gets split apart by C′ — meaning two of its members p<sub>i</sub>, p<sub>j</sub> end up in different C′-clusters.</div>
        <div class="memo"><div class="tag">★ the path argument — memorize</div>
        <div class="quote">Because p<sub>i</sub>, p<sub>j</sub> are in the same C<sub>r</sub> in C, Kruskal added all edges of some <b>path P</b> joining them before stopping, and <b>every edge on P has weight at most d*</b>. Walk along P: let p′ be the first vertex not in C′<sub>s</sub>, and p its predecessor. Then <b>d(p,p′) ≤ d*</b>, but p and p′ are in different clusters of C′, so <b>spacing(C′) ≤ d(p,p′) ≤ d*</b>.</div></div>
        <div class="translate"><b>The finish, in words:</b> our two points p<sub>i</sub>, p<sub>j</sub> are connected inside C<sub>r</sub> by a chain of edges, each no heavier than d*. Somewhere along that chain you cross from "inside C′<sub>s</sub>" to "outside it" — that single crossing edge (p, p′) joins two points in <i>different</i> C′-clusters and has weight ≤ d*. So C′ has two different-cluster points only d* apart at most → its spacing is ≤ d*. Every rival C′ has spacing ≤ d* = our spacing, so <b>ours is maximal. Done.</b></div>
        ${why('Why is every edge on the path P at most d*?','Kruskal adds edges in increasing weight order and built C<sub>r</sub> (which contains the path) before it stopped at k components. The stopping happens exactly when the next edge would weigh d*. So every edge already inside a cluster — including all of P — was added earlier and weighs at most d*.')}
      </div>`},
    {nav:'Drill',html:`
      <div class="card"><div class="eyebrow">⚔ Mastery drills</div></div>
      ${orderingChallenge('r3','Order the algorithm exactly as you would recite it:',
        ['Build a complete weighted graph: vertices = objects, edge weight = distance between them.',
         'Run Kruskal: repeatedly add the cheapest edge joining two different components.',
         'Stop once exactly k connected components remain.',
         'The vertex sets of the components are the k clusters.',
         '(Equivalently: build the full MST, then delete its k − 1 most expensive edges.)'])}
      ${quiz({id:'r3q1',prompt:'The spacing of a k-clustering is defined as…',
        options:['The largest distance within a cluster','The minimum distance between objects in different clusters','The number of clusters','The total length of the MST'],
        correct:1,explain:'Spacing = the minimum distance between any pair of objects lying in different clusters. We maximise it.'})}
      ${quiz({id:'r3q2',prompt:'Stopping Kruskal at k components is equivalent to building the full MST and then…',
        options:['removing the k − 1 cheapest edges','removing the k − 1 most expensive edges','adding k extra edges','reversing the edge order'],
        correct:1,explain:'Cutting the k − 1 most expensive MST edges splits it into exactly k components — the same clustering.'})}
      ${quiz({id:'r3q3',prompt:'In the proof, d* is the weight of…',
        options:['the cheapest edge in the graph','the (k − 1)th most expensive edge of the MST','the longest path','the diameter of a cluster'],
        correct:1,explain:'d* = weight of the (k − 1)th most expensive MST edge = the spacing of our clustering, and an upper bound on any other clustering’s spacing.'})}
    `,onShow:()=>initOrderDrag('r3')},
    {nav:'Board test',html:`
      <div class="card">
        <div class="eyebrow gold">🏛 Blackboard rehearsal</div>
        <h3>Deliver Realm III from memory</h3>
        <ul class="checklist" id="r3check">
          <li><input type="checkbox"><span><b>Purpose</b>: cluster objects so different groups are far apart — plus an example use.</span></li>
          <li><input type="checkbox"><span><b>Problem</b>: k, U = {p₁…pₙ}, distance axioms (≥0; =0 ⇔ i=j; symmetric); partition into k non-empty sets.</span></li>
          <li><input type="checkbox"><span><b>Spacing</b> = min distance between objects in different clusters; goal = maximise it.</span></li>
          <li><input type="checkbox"><span><b>Algorithm</b>: Kruskal on the distance graph, stop at k components (= MST minus k−1 priciest edges).</span></li>
          <li><input type="checkbox"><span><b>Example</b> run: add cheapest edges, stop at k, read off d*.</span></li>
          <li><input type="checkbox"><span><b>Proof</b>: d* = (k−1)th priciest MST edge; any C′ splits some Cᵣ; path edges ≤ d*; crossing edge ⇒ spacing(C′) ≤ d*.</span></li>
        </ul>
        <button class="btn gold" onclick="gradeChecklist('r3check',this)">Grade my rehearsal</button>
        <div class="examscore hide"></div>
      </div>`},
  ]
},
};

/* checklist grader */
function gradeChecklist(id,btn){
  const list=document.getElementById(id);
  const boxes=[...list.querySelectorAll('input')];
  const got=boxes.filter(b=>b.checked).length;
  const total=boxes.length;
  const out=btn.nextElementSibling;
  out.classList.remove('hide');
  const pct=Math.round(got/total*100);
  let verdict= pct===100?'👑 Flawless delivery — you would pass this realm cold.':pct>=70?'⚔ Strong, but revisit the unchecked beats.':'📜 Keep rehearsing — review the gold boxes again.';
  out.innerHTML=`${got} / ${total} beats delivered — ${pct}%<br><span class="sans muted" style="font-size:.95rem">${verdict}</span>`;
  if(pct===100&&!S.answered['chk'+id]){S.answered['chk'+id]=1;award(15,2,0);}
}

SCREENS.exam=()=>{
  const choices=[
    {k:'r1',name:'Scheduling with minimal lateness',check:'r1'},
    {k:'r2',name:'Scheduling without lateness (maximum tasks)',check:'r2'},
    {k:'r3',name:'Clustering of maximum spacing',check:'r3'},
  ];
  const pick=choices[Math.floor(Math.random()*choices.length)];
  const rubrics={
    r1:[
      'State the purpose (one resource, all tasks run, minimise max lateness) + an example.',
      'Board: a₁…aₙ, dᵢ, tᵢ, [sᵢ,fᵢ] with fᵢ = sᵢ + tᵢ, non-overlapping.',
      'Board: late ⇔ fᵢ > dᵢ; lᵢ = fᵢ − dᵢ (else 0); minimise L = maxᵢ lᵢ.',
      'Algorithm: sort by deadline, schedule with no idle time.',
      'Worked example naming sᵢ, fᵢ, lᵢ, running L.',
      'Swap proof + inequality lᵢ′ = fⱼ − dᵢ ≤ fⱼ − dⱼ = lⱼ + bubble-sort finish.',
      'Running time O(n log n).'
    ],
    r2:[
      'State the purpose (no lateness, maximise number of accepted tasks) + an example.',
      'Board: max-cardinality subset; fᵢⱼ − sᵢⱼ = tᵢⱼ; fᵢⱼ ≤ dᵢⱼ; intervals non-overlapping.',
      'Algorithm: sort by deadline; H=∅; add aᵢ; if Σtⱼ > dᵢ remove the longest; schedule H.',
      'Worked example naming H, Σt, the eviction.',
      'Proof: induction; first removed aₖ; exchange aₖ↔aₗ with tₖ ≥ tₗ; |H| = |O| squeeze.',
      'Running time: max-heap, O(n log n).'
    ],
    r3:[
      'State the purpose (cluster so different groups are far apart) + an example.',
      'Board: k, U={p₁…pₙ}, distance axioms (≥0; =0⇔i=j; symmetric); partition into k sets.',
      'Board: spacing = min cross-cluster distance; maximise it.',
      'Algorithm: Kruskal, stop at k components (= MST minus k−1 priciest edges).',
      'Worked example: add cheapest edges, stop at k, read d*.',
      'Proof: d* = (k−1)th priciest MST edge; split Cᵣ; path edges ≤ d*; spacing(C′) ≤ d*.'
    ]
  };
  const items=rubrics[pick.k].map((t,i)=>`<li><input type="checkbox"><span>${t}</span></li>`).join('');
  return el(`
    <div class="lesson-head">
      <button class="btn ghost" onclick="go('map')">← Map</button>
      <span class="pill gold">Final Trial</span>
      <h2 style="margin:0">🏛 The Examiner's Hall</h2>
    </div>
    <div class="card" style="border-color:var(--gold); box-shadow: 0 25px 60px -20px var(--gold2);">
      <div class="eyebrow gold">The examiner draws a card…</div>
      <h3 style="font-size:1.6rem;color:var(--aqua)">🎲 “${pick.name}”</h3>
      <p class="sans muted" style="font-size:1.05rem;">Stand at the board. Deliver the <b>entire</b> presentation aloud — problem in math form, algorithm, worked example, proof, running time — exactly as you rehearsed. Then tick only the beats you delivered without peeking.</p>
      <ul class="checklist" id="examcheck">${items}</ul>
      <button class="btn gold" onclick="gradeExam('${pick.k}')">Submit to the examiner</button>
      <div class="examscore hide" id="examscore"></div>
      <div class="row" style="margin-top:20px">
        <button class="btn ghost" onclick="go('exam')">🎲 Draw another card</button>
        <button class="btn ghost" onclick="go('lesson','${pick.k}')">Review this realm</button>
      </div>
    </div>
  `);
};
function gradeExam(k){
  const list=document.getElementById('examcheck');
  const boxes=[...list.querySelectorAll('input')];
  const got=boxes.filter(b=>b.checked).length,total=boxes.length;
  const pct=Math.round(got/total*100);
  const out=document.getElementById('examscore');out.classList.remove('hide');
  let v;
  if(pct===100){v='👑 PASSED WITH HONOURS. The throne is yours.';earnBadge('examiner','Throne of the Examined');if(!S.answered['exam'+k]){S.answered['exam'+k]=1;award(30,4,1);}}
  else if(pct>=70){v='⚔ A pass — but the examiner noticed the gaps. Tighten the unchecked beats.';award(8,1,0,true);}
  else v='📜 Not yet. Return to the realm and drill the gold boxes.';
  out.innerHTML=`${got} / ${total} — ${pct}%<br><span class="sans muted" style="font-size:1rem">${v}</span>`;
}
